bullets:
  - text: "Selected by the Director of Safety & Mission Assurance to establish the Quality Engineering organization based on outstanding performance and recommendations from senior leadership."
    tags: [mission-assurance, leadership]
  - text: "Built and led an organization of more than 90 Quality Engineers and Inspectors supporting national security space programs."
